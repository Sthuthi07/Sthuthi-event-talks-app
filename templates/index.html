<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Explore and search BigQuery release notes, filter updates by category, and easily share them on Twitter (X).">
  <title>BigQuery Release Notes Hub</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- CSS -->
  <link rel="stylesheet" href="/static/css/style.css">
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- Background Accents -->
  <div class="bg-blur blur-1"></div>
  <div class="bg-blur blur-2"></div>

  <header class="navbar">
    <div class="logo">
      <div class="logo-icon">
        <i class="fa-solid fa-database"></i>
      </div>
      <div class="logo-text">
        <h1>BigQuery</h1>
        <span>Release Notes Hub</span>
      </div>
    </div>
    <div class="nav-actions">
      <button id="theme-toggle" class="btn btn-secondary btn-icon" title="Toggle Theme" aria-label="Toggle Theme">
        <i class="fa-solid fa-moon"></i>
      </button>
      <button id="refresh-btn" class="btn btn-primary" title="Refresh Release Notes">
        <i class="fa-solid fa-arrows-rotate" id="refresh-icon"></i>
        <span>Refresh</span>
      </button>
    </div>
  </header>

  <main class="container">
    <!-- Search and Filter Bar -->
    <section class="controls-panel card">
      <div class="search-wrapper">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
        <input type="text" id="search-input" placeholder="Search updates (e.g., 'Gemini', 'JSON', 'partition')..." aria-label="Search updates">
      </div>
      <div class="filter-wrapper">
        <span class="filter-label">Filter by type:</span>
        <div class="filter-buttons">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="feature"><span class="dot dot-feature"></span>Feature</button>
          <button class="filter-btn" data-filter="breaking"><span class="dot dot-breaking"></span>Breaking</button>
          <button class="filter-btn" data-filter="issue"><span class="dot dot-issue"></span>Issue</button>
          <button class="filter-btn" data-filter="change"><span class="dot dot-change"></span>Change</button>
          <button class="filter-btn" data-filter="announcement"><span class="dot dot-announcement"></span>Announcement</button>
        </div>
      </div>
    </section>

    <!-- Stats & Info -->
    <section class="info-bar">
      <div class="info-stat">
        <span id="showing-count">Showing 0 updates</span>
      </div>
      <div class="select-all-wrapper">
        <label class="checkbox-container">
          <input type="checkbox" id="select-all-checkbox">
          <span class="checkmark"></span>
          Select all on page
        </label>
      </div>
    </section>

    <!-- Release Notes Grid -->
    <section id="notes-grid" class="notes-grid">
      <!-- Loading State -->
      <div class="loading-state" id="loading-state">
        <div class="spinner"></div>
        <p>Fetching BigQuery Release Notes...</p>
      </div>

      <!-- Empty State -->
      <div class="empty-state hidden" id="empty-state">
        <i class="fa-regular fa-folder-open"></i>
        <h3>No release notes found</h3>
        <p>Try refining your search query or selecting a different filter.</p>
      </div>
    </section>
  </main>

  <!-- Floating Selection Drawer -->
  <div class="selection-drawer card hidden" id="selection-drawer">
    <div class="drawer-content">
      <div class="drawer-text">
        <span class="badge" id="selected-count-badge">0</span>
        <span>updates selected</span>
      </div>
      <div class="drawer-actions">
        <button id="clear-selection-btn" class="btn btn-secondary">
          <i class="fa-solid fa-xmark"></i> Clear
        </button>
        <button id="tweet-selected-btn" class="btn btn-tweet">
          <i class="fa-brands fa-x-twitter"></i> Tweet Selected
        </button>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="/static/js/main.js"></script>
</body>
</html>
